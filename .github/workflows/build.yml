name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Forge
        run: ./gradlew :forge:build
      - name: Upload Forge JAR
        uses: actions/upload-artifact@v4
        with:
          name: obscure-tooltips-forge
          path: forge/build/libs/*.jar

  build-fabric:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build Fabric
        run: ./gradlew :fabric:build
      - name: Upload Fabric JAR
        uses: actions/upload-artifact@v4
        with:
          name: obscure-tooltips-fabric
          path: fabric/build/libs/*.jar
